version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: analytics-postgres
    environment:
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: analytics
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: analytics-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: analytics-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  redis:
    image: redis:7-alpine
    container_name: analytics-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: analytics-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://analytics:changeme@postgres:5432/analytics
      JWT_SECRET: changeme-secret-key-change-in-production
      JWT_ALGORITHM: HS256
      JWT_EXPIRATION_MINUTES: 60
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

  ingestion-service:
    build:
      context: .
      dockerfile: docker/ingestion.Dockerfile
    container_name: analytics-ingestion
    ports:
      - "8001:8001"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_RAW_EVENTS: raw_events
      DATABASE_URL: postgresql://analytics:changeme@postgres:5432/analytics
      CORS_ORIGINS: http://localhost:3000
    depends_on:
      - kafka
      - postgres

  stream-processor:
    build:
      context: .
      dockerfile: docker/stream.Dockerfile
    container_name: analytics-stream-processor
    environment:
      DATABASE_URL: postgresql://analytics:changeme@postgres:5432/analytics
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_RAW_EVENTS: raw_events
      KAFKA_TOPIC_PROCESSED_EVENTS: processed_events
      KAFKA_CONSUMER_GROUP: stream-processor
    depends_on:
      - kafka
      - postgres

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: analytics-worker
    environment:
      DATABASE_URL: postgresql://analytics:changeme@postgres:5432/analytics
    depends_on:
      - postgres

  dashboard:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: analytics-dashboard
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres-data:

networks:
  default:
    name: analytics-network